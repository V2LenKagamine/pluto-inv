name: Update Server
on:
  push:
    branches:
      - [ master ]
    workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: DoIt
        uses: Plagiatus/RCON-Action@v0.3
        with:
          server: ${{secrets.SERVER_IP}}
          port: ${{secrets.RCON_PORT}}
          password: ${{secrets.RCON_PASS}}
          commands: '["changelevel ttt_cold_memory"]'